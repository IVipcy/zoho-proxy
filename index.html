<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>相続面談シート｜オーシャン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --navy: #0D2B4E;
    --navy-mid: #163B6B;
    --navy-light: #1E5799;
    --accent: #00C9A7;
    --accent-dim: #00A88A;
    --gold: #F5C842;
    --bg: #F0F4F8;
    --card: #FFFFFF;
    --text: #1A2B3C;
    --muted: #6B7E93;
    --border: #D0DCE8;
    --danger: #E53E3E;
    --warn: #DD6B20;
    --tag-bg: #E8F4FF;
    --tag-border: #B3D4F0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(13,43,78,0.3);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .logo {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }

  /* ===== STEP NAV ===== */
  .step-nav {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0;
  }
  .step-nav::-webkit-scrollbar { display: none; }

  .step-tab {
    flex: 0 0 auto;
    padding: 10px 16px 12px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
    letter-spacing: 0.3px;
  }

  .step-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .step-tab.done {
    color: rgba(0,201,167,0.6);
  }

  .step-tab.done::after {
    content: '✓';
    margin-left: 4px;
    font-size: 10px;
  }

  /* ===== MAIN ===== */
  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 0;
  }

  /* ===== SECTION ===== */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .section-icon {
    width: 40px;
    height: 40px;
    background: var(--navy);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.3px;
  }

  .section-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(13,43,78,0.06);
    border: 1px solid var(--border);
  }

  .card-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .required-dot {
    width: 6px;
    height: 6px;
    background: var(--danger);
    border-radius: 50%;
    display: inline-block;
  }

  /* ===== INPUT ===== */
  .input-field {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--navy-light);
    box-shadow: 0 0 0 3px rgba(30,87,153,0.12);
    background: #fff;
  }

  textarea.input-field {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* ===== PILL SELECTOR ===== */
  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    padding: 10px 18px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    background: var(--bg);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }

  .pill:active { transform: scale(0.96); }

  .pill.selected {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }

  .pill.selected.multi {
    background: var(--navy-light);
    border-color: var(--navy-light);
  }

  /* ===== TOGGLE CARDS ===== */
  .toggle-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  @media (max-width: 480px) {
    .toggle-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .toggle-card {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
    user-select: none;
    -webkit-user-select: none;
  }

  .toggle-card:active { transform: scale(0.97); }

  .toggle-card .tc-icon { font-size: 20px; margin-bottom: 4px; }
  .toggle-card .tc-label { font-size: 12px; font-weight: 500; color: var(--muted); }

  .toggle-card.on {
    background: #E8F8F4;
    border-color: var(--accent);
  }

  .toggle-card.on .tc-label { color: var(--accent-dim); font-weight: 700; }

  /* ===== NUMBER INPUT ===== */
  .number-stepper {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    width: 160px;
  }

  .stepper-btn {
    width: 48px;
    height: 48px;
    background: none;
    border: none;
    font-size: 22px;
    color: var(--navy);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }

  .stepper-btn:active { background: rgba(13,43,78,0.08); }

  .stepper-val {
    flex: 1;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--navy);
    border: none;
    background: none;
    width: 60px;
  }

  /* ===== HEIR BLOCK ===== */
  .heir-block {
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    background: var(--bg);
    position: relative;
  }

  .heir-number {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .btn-remove {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #FEE2E2;
    color: var(--danger);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-add {
    width: 100%;
    padding: 14px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    background: none;
    color: var(--navy-light);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .btn-add:active { background: rgba(30,87,153,0.06); }

  /* ===== AUTO CALC ===== */
  .calc-box {
    background: linear-gradient(135deg, #0D2B4E 0%, #163B6B 100%);
    border-radius: 14px;
    padding: 18px 20px;
    color: #fff;
  }

  .calc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .calc-row:last-child { border-bottom: none; }

  .calc-row-label {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }

  .calc-row-val {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--accent);
  }

  .calc-row-val.warn { color: var(--gold); }
  .calc-row-val.danger { color: #FC8181; }

  .tax-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    margin-top: 8px;
  }

  .tax-badge.required { background: #FC8181; color: #fff; }
  .tax-badge.not-required { background: var(--accent); color: #fff; }
  .tax-badge.unknown { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }

  /* ===== RANK BADGE ===== */
  .rank-display {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
  }

  .rank-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .rank-S { background: #2D3748; color: var(--gold); box-shadow: 0 4px 16px rgba(245,200,66,0.4); }
  .rank-A { background: #22543D; color: #68D391; box-shadow: 0 4px 16px rgba(104,211,145,0.3); }
  .rank-B { background: #1A365D; color: #90CDF4; box-shadow: 0 4px 16px rgba(144,205,244,0.3); }
  .rank-C { background: #7B341E; color: #FBD38D; box-shadow: 0 4px 16px rgba(251,211,141,0.3); }
  .rank-D { background: #742A2A; color: #FC8181; box-shadow: 0 4px 16px rgba(252,129,129,0.3); }
  .rank-unknown { background: var(--border); color: var(--muted); }

  .rank-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ===== BOTTOM BAR ===== */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(13,43,78,0.1);
  }

  .btn-prev {
    flex: 0 0 auto;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--navy);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }

  .btn-next {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy) 100%);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    box-shadow: 0 4px 12px rgba(13,43,78,0.25);
  }

  .btn-next:active { transform: scale(0.98); }

  .btn-submit {
    background: linear-gradient(135deg, var(--accent-dim) 0%, #007A63 100%);
    box-shadow: 0 4px 12px rgba(0,168,138,0.35);
  }

  /* ===== CONFIRM VIEW ===== */
  .confirm-section {
    margin-bottom: 20px;
  }

  .confirm-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 0 8px;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 12px;
  }

  .confirm-row {
    display: flex;
    padding: 8px 0;
    border-bottom: 1px solid var(--bg);
    gap: 12px;
  }

  .confirm-key {
    font-size: 12px;
    color: var(--muted);
    flex: 0 0 140px;
    padding-top: 1px;
  }

  .confirm-val {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    word-break: break-all;
  }

  .confirm-val.empty { color: var(--border); font-style: italic; }

  .chip {
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid var(--tag-border);
    color: var(--navy-light);
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 100px;
    margin: 2px 2px 2px 0;
  }

  /* ===== PROGRESS ===== */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ===== DIVIDER ===== */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .spacer { height: 12px; }

  /* ===== MISC ===== */
  .flex-row { display: flex; align-items: center; gap: 10px; }

  .info-chip {
    background: var(--tag-bg);
    border: 1px solid var(--tag-border);
    color: var(--navy-light);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 600;
  }

  .hidden { display: none !important; }

  /* ===== SUCCESS ===== */
  .success-view {
    text-align: center;
    padding: 60px 20px;
  }

  .success-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--accent) 0%, #007A63 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
    box-shadow: 0 8px 24px rgba(0,201,167,0.35);
  }

  .success-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .success-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
  }

  .json-box {
    background: #1E1E1E;
    border-radius: 14px;
    padding: 20px;
    margin-top: 24px;
    text-align: left;
    overflow-x: auto;
  }

  .json-box pre {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #D4D4D4;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
  }

  .btn-copy {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--navy);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .btn-restart {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--navy);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* ===== 録音バー ===== */
  .rec-bar {
    position: fixed;
    bottom: 76px;
    left: 0; right: 0;
    z-index: 99;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 -2px 12px rgba(13,43,78,0.2);
    transition: transform 0.3s;
  }

  .rec-bar.hidden-bar { transform: translateY(100%); }

  .rec-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #FC8181;
    flex-shrink: 0;
    animation: recPulse 1s infinite;
  }

  @keyframes recPulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .rec-dot.paused { animation: none; background: var(--gold); }
  .rec-dot.stopped { animation: none; background: var(--muted); }

  .rec-timer {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    min-width: 52px;
  }

  .rec-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    flex: 1;
  }

  .rec-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .rec-btn:active { transform: scale(0.9); }
  .rec-btn.pause { background: rgba(255,255,255,0.15); color: #fff; }
  .rec-btn.stop  { background: #FC8181; color: #fff; }

  /* ===== 録音トグルボタン（ヘッダー横） ===== */
  .rec-toggle {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .rec-toggle.recording {
    background: #FC8181;
    border-color: #FC8181;
    color: #fff;
    animation: recPulse 1.2s infinite;
  }



  /* ===== AI自動入力ハイライト ===== */
  .ai-filled {
    border-color: var(--accent) !important;
    background: #E8FAF6 !important;
    box-shadow: 0 0 0 3px rgba(0,201,167,0.15) !important;
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 100px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }

  .ai-pill {
    border-color: var(--accent) !important;
    background: #E8FAF6 !important;
    color: var(--accent-dim) !important;
    font-weight: 700 !important;
  }

  /* ===== AI処理中オーバーレイ ===== */
  .ai-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,43,78,0.85);
    z-index: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .ai-overlay-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, #007A63 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    animation: aiPulse 1.5s infinite;
  }

  @keyframes aiPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,201,167,0.4); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 16px rgba(0,201,167,0); }
  }

  .ai-overlay-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .ai-overlay-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    line-height: 1.7;
  }

  .ai-progress-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
  }

  .ai-step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    transition: color 0.3s;
  }

  .ai-step.active { color: var(--accent); }
  .ai-step.done { color: rgba(255,255,255,0.7); }

  .ai-step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .ai-step.active .ai-step-dot { background: var(--accent); animation: recPulse 1s infinite; }
  .ai-step.done .ai-step-dot { background: var(--accent); animation: none; }

  /* ===== APIキー設定モーダル ===== */
  .apikey-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);

    align-items: flex-end;

  .apikey-sheet {
    background: #fff;
    border-radius: 24px 24px 0 0;
    width: 100%;

  /* ===== 文字起こし全文パネル ===== */
  .transcript-panel {
    background: #1E1E1E;
    border-radius: 14px;
    padding: 16px;
    margin-top: 16px;
  }

  .transcript-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .transcript-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .transcript-body {
    font-size: 13px;
    color: #D4D4D4;
    line-height: 1.8;
    max-height: 200px;

<body>

<header class="app-header">
  <div class="header-top">
    <div>
      <div class="logo">OCEAN</div>
      <div class="header-title">相続面談シート</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="date-badge" id="headerDate"></div>
      <button class="rec-toggle" id="recToggleBtn" onclick="toggleFullRecording()" title="面談全体を録音">🎙️</button>
      
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <nav class="step-nav" id="stepNav"></nav>
</header>

<!-- 録音ステータスバー -->
<div class="rec-bar hidden-bar" id="recBar">
  <div class="rec-dot" id="recDot"></div>
  <div class="rec-timer" id="recTimer">00:00</div>
  <div class="rec-label" id="recLabel">録音中...</div>
  <button class="rec-btn pause" id="recPauseBtn" onclick="pauseResume()">⏸</button>
  <button class="rec-btn stop"  onclick="stopFullRecording()">■</button>
</div>

<main class="main" id="mainContent"></main>

<div class="bottom-bar" id="bottomBar">
  <button class="btn-prev" id="btnPrev" onclick="prevStep()">← 戻る</button>
  <button class="btn-next" id="btnNext" onclick="nextStep()">次へ <span>→</span></button>
</div>

<script>
// ============================================================
// DATA MODEL
// ============================================================
const data = {
  // 基本
  Sales_Owner: '', Order_Date: new Date().toISOString().slice(0,10), Difficulty: '',
  // 依頼者
  Client_Name: '', Client_Kana: '', Client_Phone: '', Client_Mobile: '', Client_Email: '',
  Contact_Preference: [], Customer_Number: '',
  // 被相続人
  Deceased_Name: '', Deceased_Kana: '', Deceased_Birthday: '', Date_of_Death: '',
  Deceased_Address: '', Deceased_Domicile: '',
  // 相続人
  heirs: [],
  // 受注内容
  Procedure_Type: [], Other_Procedure: '', Additional_Services: [],
  Task_Koseki: false, Task_Chart: false, Task_Legal_Info: false, Task_RealEstate: false,
  Task_Finance: false, Task_Inventory: false, Task_Agreement: false, Task_Registration: false,
  Task_Cancel: false, Task_Letter: false, Task_Will: false, Task_Petition: false,
  Task_Contract: false, Task_Appraisal: false,
  // 受注ルート
  Lead_Source: '', LP_Partner_Name: '', Partner_Rep: '', Referral_To: '', Referral_Rep: '',
  Referral_Sheet_Done: false,
  // 不動産
  Property_Sale: '', Resident_Status: '', Resident_Name: '', Title_Deed: false,
  Tax_Notice: false, Valuation_Method: '', RE_Agent: '', Sale_Schedule: '',
  Property_Type: '', Building_Age: '', Area_Rating: '', Sale_Urgency: '',
  Mansion_Note: false, Property_General_Notes: '', Property_Rank: '',
  // 金融
  Passbook_Status: '', Cancellation_Support: '', Bank_Names: '',
  // 資産・相続税
  Total_Asset_Estimate: '', Tax_Filing_Required: '', Tax_Advisor_Referral: '',
  Tax_Advisor_Name: '', Tax_Filing_Deadline: '',
  // 遺産分割
  Client_Intention: '', Distribution_Policy: '', Distribution_Proposal: '',
  Agreement_Signing: '', Inventory_Items: [], Tax_Case_Reference: false,
  // 郵送
  Mailing_Destination: '', Alt_Mailing_Address: '', Important_Notes: '', Survey_Document: '',
  // 遺言
  Will_Type: '', Will_Storage: '', Will_Execution: '', Iryubun_Risk: '', Bequest: '',
  Creation_Location: '', Notary_Office: '',
  // 信託
  Trust_Type: '',
  // 生命保険
  Insurance_Proposal: '', Insurance_Company: '', Insurance_Detail: '',
  Insurance_Assoc_Inquiry: '', Insurance_Inquiry_Notes: '',
};

// ============================================================
// STEPS CONFIG
// ============================================================
const STEPS = [
  { id: 'basic',    label: '基本情報',   icon: '📋' },
  { id: 'client',   label: '依頼者',     icon: '👤' },
  { id: 'deceased', label: '被相続人',   icon: '📁' },
  { id: 'heirs',    label: '相続人',     icon: '👨‍👩‍👧' },
  { id: 'order',    label: '受注内容',   icon: '📝' },
  { id: 'property', label: '不動産',     icon: '🏠' },
  { id: 'finance',  label: '金融・税',   icon: '💴' },
  { id: 'division', label: '分割・遺言', icon: '⚖️' },
  { id: 'confirm',  label: '確認',       icon: '✅' },
];

let currentStep = 0;
const completedSteps = new Set();

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
  buildNav();
  renderStep(0);
});

function buildNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) =>
    `<div class="step-tab ${i===0?'active':''}" id="tab_${i}" onclick="goStep(${i})">${s.label}</div>`
  ).join('');
}

function updateNav() {
  STEPS.forEach((_, i) => {
    const tab = document.getElementById(`tab_${i}`);
    tab.className = 'step-tab' +
      (i === currentStep ? ' active' : '') +
      (completedSteps.has(i) && i !== currentStep ? ' done' : '');
  });
  // progress
  const pct = ((currentStep + 1) / STEPS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  // scroll tab into view
  document.getElementById(`tab_${currentStep}`)?.scrollIntoView({inline:'center',behavior:'smooth'});
}

function goStep(i) {
  currentStep = i;
  renderStep(i);
}

function nextStep() {
  completedSteps.add(currentStep);
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep(currentStep);
    window.scrollTo(0, 0);
  } else {
    showSuccess();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderStep(currentStep);
    window.scrollTo(0, 0);
  }
}

function renderStep(i) {
  updateNav();
  const main = document.getElementById('mainContent');
  const step = STEPS[i];
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnPrev.style.display = i === 0 ? 'none' : 'block';
  const isLast = i === STEPS.length - 1;
  btnNext.textContent = isLast ? '✓ 送信・確定' : '次へ →';
  btnNext.className = 'btn-next' + (isLast ? ' btn-submit' : '');

  const renders = {
    basic:    renderBasic,
    client:   renderClient,
    deceased: renderDeceased,
    heirs:    renderHeirs,
    order:    renderOrder,
    property: renderProperty,
    finance:  renderFinance,
    division: renderDivision,
    confirm:  renderConfirm,
  };
  main.innerHTML = '';
  renders[step.id]();
}

// ============================================================
// HELPERS
// ============================================================
function sectionHeader(icon, title, sub='') {
  return `<div class="section-header">
    <div class="section-icon">${icon}</div>
    <div><div class="section-title">${title}</div>${sub?`<div class="section-sub">${sub}</div>`:''}</div>
  </div>`;
}

function card(label, content, required=false) {
  return `<div class="card">
    <div class="card-label">${required?'<span class="required-dot"></span>':''}${label}</div>
    ${content}
  </div>`;
}

function textInput(key, placeholder='', type='text') {
  const val = data[key] || '';
  const aiClass = AI_FILLED_FIELDS.has(key) ? ' ai-filled' : '';
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<input class="input-field${aiClass}" type="${type}" value="${val}"
    placeholder="${placeholder}"
    oninput="data['${key}']=this.value;AI_FILLED_FIELDS.delete('${key}')"
    onblur="updateCalc()">`;
}

function dateInput(key) {
  const val = data[key] || '';
  const aiClass = AI_FILLED_FIELDS.has(key) ? ' ai-filled' : '';
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<input class="input-field${aiClass}" type="date" value="${val}"
    onchange="data['${key}']=this.value;AI_FILLED_FIELDS.delete('${key}');updateCalc()">`;
}

function textareaInput(key, placeholder='') {
  const val = data[key] || '';
  const aiClass = AI_FILLED_FIELDS.has(key) ? ' ai-filled' : '';
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<textarea class="input-field${aiClass}" placeholder="${placeholder}"
    oninput="data['${key}']=this.value;AI_FILLED_FIELDS.delete('${key}')">${val}</textarea>`;
}

function pills(key, options, multi=false) {
  const aiBadge = AI_FILLED_FIELDS.has(key) ? '<span class="ai-badge">✦ AI入力</span>' : '';
  return `${aiBadge}<div class="pill-group">${options.map(o => {
    const isSelected = multi
      ? (data[key]||[]).includes(o)
      : data[key] === o;
    const isAi = isSelected && AI_FILLED_FIELDS.has(key);
    const cls = 'pill' + (isSelected ? (multi?' selected multi':' selected') : '') + (isAi ? ' ai-pill' : '');
    return `<div class="${cls}" onclick="togglePill('${key}','${o}',${multi})">${o}</div>`;
  }).join('')}</div>`;
}

function togglePill(key, val, multi) {
  if (multi) {
    if (!Array.isArray(data[key])) data[key] = [];
    const idx = data[key].indexOf(val);
    if (idx >= 0) data[key].splice(idx, 1);
    else data[key].push(val);
  } else {
    data[key] = data[key] === val ? '' : val;
  }
  renderStep(currentStep);
  updateCalc();
}

function toggleCards(tasks) {
  return `<div class="toggle-grid">${tasks.map(([key, icon, label]) => {
    const on = data[key];
    return `<div class="toggle-card ${on?'on':''}" onclick="data['${key}']=!data['${key}'];renderStep(currentStep)">
      <div class="tc-icon">${icon}</div>
      <div class="tc-label">${label}</div>
    </div>`;
  }).join('')}</div>`;
}

function toggleCheck(key, label) {
  const on = data[key];
  return `<div class="pill ${on?'selected':''}" onclick="data['${key}']=!data['${key}'];renderStep(currentStep)">${on?'✓ ':''} ${label}</div>`;
}

// ============================================================
// STEP RENDERS
// ============================================================
function renderBasic() {
  const m = document.getElementById('mainContent');
  m.innerHTML = sectionHeader('📋', '基本情報', '面談開始時に確認する項目') +
    card('面談日', dateInput('Order_Date'), true) +
    card('受注担当', textInput('Sales_Owner','担当者名を入力'), true) +
    card('難易度', pills('Difficulty', ['易','普','難'])) +
    card('受注ルート', pills('Lead_Source', ['LP','公益社','その他'])) +
    (data.Lead_Source === 'LP' ? card('LP名・担当者',
      `<div style="display:grid;gap:10px">
        ${textInput('LP_Partner_Name','LP会社名')}
        ${textInput('Partner_Rep','担当者名')}
      </div>`) : '') +
    '<div class="spacer"></div>';
}

function renderClient() {
  const m = document.getElementById('mainContent');
  m.innerHTML = sectionHeader('👤', '依頼者情報', '面談にご来所された方の情報') +
    card('氏名', `<div style="display:grid;gap:10px">${textInput('Client_Name','山田 太郎', 'text')}${textInput('Client_Kana','やまだ たろう','text')}</div>`, true) +
    card('連絡先', `<div style="display:grid;gap:10px">
      ${textInput('Client_Phone','03-0000-0000','tel')}
      ${textInput('Client_Mobile','090-0000-0000','tel')}
      ${textInput('Client_Email','example@email.com','email')}
    </div>`) +
    card('連絡先希望', pills('Contact_Preference', ['自宅TEL','携帯TEL','メール'], true)) +
    card('郵送先', pills('Mailing_Destination', ['依頼者住所','その他'])) +
    (data.Mailing_Destination === 'その他' ? card('郵送先住所', textInput('Alt_Mailing_Address','郵送先住所を入力')) : '') +
    '<div class="spacer"></div>';
}

function renderDeceased() {
  const m = document.getElementById('mainContent');
  m.innerHTML = sectionHeader('📁', '被相続人情報', 'お亡くなりになった方の情報') +
    card('氏名', `<div style="display:grid;gap:10px">${textInput('Deceased_Name','田中 花子')}${textInput('Deceased_Kana','たなか はなこ')}</div>`, true) +
    card('生年月日', dateInput('Deceased_Birthday')) +
    card('死亡日（相続開始日）', dateInput('Date_of_Death'), true) +
    card('住所', textInput('Deceased_Address','〒000-0000 都道府県 市区町村 番地')) +
    card('本籍', textInput('Deceased_Domicile','本籍地を入力')) +
    card('財産調査使用書類', pills('Survey_Document', ['委任状','契約書'])) +
    '<div class="spacer"></div>';
}

function renderHeirs() {
  const m = document.getElementById('mainContent');
  let heirHTML = '';
  data.heirs.forEach((h, i) => {
    heirHTML += `<div class="heir-block">
      <div class="heir-number">相続人 ${i+1}</div>
      <button class="btn-remove" onclick="removeHeir(${i})">✕</button>
      <div style="display:grid;gap:10px">
        <input class="input-field" placeholder="氏名" value="${h.Heir_Name||''}"
          oninput="data.heirs[${i}].Heir_Name=this.value">
        <input class="input-field" placeholder="ふりがな" value="${h.Heir_Kana||''}"
          oninput="data.heirs[${i}].Heir_Kana=this.value">
        <div class="pill-group">${['配偶者','子','父母','兄弟姉妹','代襲相続人','その他'].map(rel => {
          const sel = h.Relationship === rel;
          return `<div class="pill ${sel?'selected':''}"
            onclick="data.heirs[${i}].Relationship='${rel}';renderStep(currentStep)">${rel}</div>`;
        }).join('')}</div>
        <div class="flex-row">
          <div class="pill ${h.Legal_Heir?'selected':''}"
            onclick="data.heirs[${i}].Legal_Heir=!data.heirs[${i}].Legal_Heir;renderStep(currentStep);updateCalc()">
            ${h.Legal_Heir?'✓ ':''} 法定相続人
          </div>
        </div>
      </div>
    </div>`;
  });
  m.innerHTML = sectionHeader('👨‍👩‍👧', '相続人情報', '法定相続人数は基礎控除の計算に使用') +
    heirHTML +
    `<button class="btn-add" onclick="addHeir()">＋ 相続人を追加</button>` +
    '<div class="spacer"></div>';
}

function addHeir() {
  data.heirs.push({ Heir_Name:'', Heir_Kana:'', Relationship:'', Legal_Heir: true,
    Heir_Address:'', Heir_Domicile:'', Heir_Phone:'', Heir_Email:'' });
  renderStep(currentStep);
}

function removeHeir(i) {
  data.heirs.splice(i, 1);
  renderStep(currentStep);
  updateCalc();
}

function renderOrder() {
  const m = document.getElementById('mainContent');
  m.innerHTML = sectionHeader('📝', '受注内容', '受任する業務の範囲を確認') +
    card('手続区分', pills('Procedure_Type',
      ['手続一式','登記','遺言','放棄','調停','検認','後見','手紙','契約書','執行','コンサル'], true), true) +
    card('付帯サービス', pills('Additional_Services', ['相続税申告','不動産売却','生命保険'], true)) +
    card('受任業務チェック', toggleCards([
      ['Task_Koseki','📜','戸籍'],
      ['Task_Chart','🗂️','相関図'],
      ['Task_Legal_Info','⚖️','法定相続情報'],
      ['Task_RealEstate','🏠','不動産'],
      ['Task_Finance','💴','金融資産'],
      ['Task_Inventory','📋','目録'],
      ['Task_Agreement','📄','協議書'],
      ['Task_Registration','🏛️','登記'],
      ['Task_Cancel','🔒','解約'],
      ['Task_Letter','✉️','手紙'],
      ['Task_Will','📜','遺言起案'],
      ['Task_Petition','🏛️','申立書'],
      ['Task_Contract','📝','契約書起案'],
      ['Task_Appraisal','🏡','不動産査定'],
    ])) +
    card('特記事項・備考', textareaInput('Important_Notes','特別な事情・注意事項があれば記入')) +
    '<div class="spacer"></div>';
}

function renderProperty() {
  const hasProp = data.Task_RealEstate || data.Additional_Services?.includes('不動産売却');
  const m = document.getElementById('mainContent');
  if (!hasProp) {
    m.innerHTML = sectionHeader('🏠','不動産','受注内容で「不動産」を選択していません') +
      `<div class="card" style="text-align:center;padding:40px 20px;">
        <div style="font-size:40px;margin-bottom:12px">🏠</div>
        <div style="color:var(--muted);font-size:14px;">不動産案件でない場合はスキップできます。<br>不動産関連の業務を受任する場合は「受注内容」で選択してください。</div>
      </div>`;
    return;
  }
  const rank = calcPropertyRank();
  const rankDescs = {S:'最優先で査定・売却推進',A:'早めの査定推進',B:'通常対応',C:'慎重に判断',D:'売却困難・要注意','確認中':'エリア・築年数を確認してください'};
  m.innerHTML = sectionHeader('🏠', '不動産', '不動産評価ランクが売却スピードに影響します') +
    card('物件種別', pills('Property_Type', ['戸建','マンション','土地','収益物件','その他'])) +
    card('住人有無', pills('Resident_Status', ['空き家','居住中（相続人）','居住中（第三者）','賃貸中'])) +
    (data.Resident_Status && data.Resident_Status.includes('居住中') ?
      card('住人名', textInput('Resident_Name','住人の氏名')) : '') +
    card('エリア評価', pills('Area_Rating', ['人気エリア','標準','不人気エリア'])) +
    card('築年数', `<div class="flex-row">
      <div class="number-stepper">
        <button class="stepper-btn" onclick="changeAge(-5)">−</button>
        <input class="stepper-val" type="number" value="${data.Building_Age||0}"
          oninput="data.Building_Age=parseInt(this.value)||0;updateCalc();renderStep(currentStep)">
        <button class="stepper-btn" onclick="changeAge(5)">＋</button>
      </div>
      <span style="font-size:14px;color:var(--muted)">年</span>
    </div>`) +
    card('不動産評価ランク（自動判定）',
      `<div class="rank-display">
        <div class="rank-circle rank-${rank}">${rank}</div>
        <div class="rank-desc">${rankDescs[rank]||''}</div>
      </div>`) +
    card('売却意向', pills('Property_Sale', ['有','無','検討中'])) +
    card('売却緊急度', pills('Sale_Urgency', ['高（即対応）','中','低'])) +
    card('書類確認', `<div class="pill-group">
      ${toggleCheck('Title_Deed','権利書あり')}
      ${toggleCheck('Tax_Notice','納税通知書あり')}
      ${toggleCheck('Mansion_Note','マンション敷地注意')}
    </div>`) +
    card('不動産業者・売却時期', `<div style="display:grid;gap:10px">
      ${textInput('RE_Agent','業者名（すでに相談中の場合）')}
      ${textInput('Sale_Schedule','売却希望時期')}
    </div>`) +
    card('不動産備考', textareaInput('Property_General_Notes','同居状況・特記事項など')) +
    '<div class="spacer"></div>';
}

function changeAge(delta) {
  data.Building_Age = Math.max(0, (parseInt(data.Building_Age)||0) + delta);
  renderStep(currentStep);
  updateCalc();
}

function renderFinance() {
  const legalHeirCount = data.heirs.filter(h => h.Legal_Heir).length;
  const basicDeduction = 3000 + 600 * legalHeirCount;
  const assetRaw = parseFloat(String(data.Total_Asset_Estimate).replace(/[,万円]/g,'')) || 0;
  const assetMan = assetRaw; // 万円単位
  const taxable = assetMan - basicDeduction;
  const taxStatus = data.Total_Asset_Estimate
    ? (taxable > 0 ? 'required' : 'not-required')
    : 'unknown';
  const taxLabel = { required:'申告　要', 'not-required':'申告　不要', unknown:'確認中' };
  // deadline
  let deadline = '';
  if (data.Date_of_Death) {
    const d = new Date(data.Date_of_Death);
    d.setMonth(d.getMonth() + 10);
    deadline = d.toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
    data.Tax_Filing_Deadline = d.toISOString().slice(0,10);
  }

function calcPropertyRank() {
  const area = data.Area_Rating;
  const status = data.Resident_Status;
  const age = parseInt(data.Building_Age)||0;
  if (!area && !status && !age) return '確認中';
  if (area === '人気エリア' && status === '空き家' && age <= 20) return 'S';
  if (area === '人気エリア' || (status === '空き家' && age <= 30)) return 'A';
  if (area === '標準') return 'B';
  if (area === '不人気エリア' || age > 40) return 'C';
  return 'B';
}

function updateCalc() {
  data.Property_Rank = calcPropertyRank();
  const legalHeirCount = data.heirs.filter(h=>h.Legal_Heir).length;
  const basicDeduction = 3000 + 600 * legalHeirCount;
  const assetMan = parseFloat(String(data.Total_Asset_Estimate).replace(/[,万円]/g,''))||0;
  if (data.Total_Asset_Estimate) {
    data.Tax_Filing_Required = assetMan > basicDeduction ? '要' : '不要';
  }
  if (data.Date_of_Death) {
    const d = new Date(data.Date_of_Death);
    d.setMonth(d.getMonth() + 10);
    data.Tax_Filing_Deadline = d.toISOString().slice(0,10);
  }
}

// --- 全体録音（MediaRecorder） ---
let mediaRecorder = null;
let audioChunks = [];
let recSeconds = 0;
let recInterval = null;
let recPaused = false;
let transcriptLog = []; // {time, text}
let fullTranscript = '';

// 全体録音の文字起こし用SpeechRecognition
let fullRecognition = null;

function toggleFullRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    stopFullRecording();
  } else {
    startFullRecording();
  }
}

async function startFullRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    recSeconds = 0;
    recPaused = false;
    transcriptLog = [];
    fullTranscript = '';

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start(1000);

    // タイマー
    recInterval = setInterval(() => {
      if (!recPaused) {
        recSeconds++;
        document.getElementById('recTimer').textContent = formatTime(recSeconds);
      }
    }, 1000);

    // UIをREC状態に
    document.getElementById('recBar').classList.remove('hidden-bar');
    document.getElementById('recToggleBtn').classList.add('recording');
    document.getElementById('recDot').className = 'rec-dot';
    document.getElementById('recLabel').textContent = '録音中 — 面談終了後に■で停止';

    // Web Speech APIで並行して文字起こし
    startFullTranscription();

  } catch(e) {
    alert('マイクへのアクセスを許可してください');
  }
}

function startFullTranscription() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  fullRecognition = new SR();
  fullRecognition.lang = 'ja-JP';
  fullRecognition.continuous = true;
  fullRecognition.interimResults = false;

  fullRecognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        const text = e.results[i][0].transcript;
        const time = formatTime(recSeconds);
        transcriptLog.push({ time, text });
        fullTranscript += text + '。';
        // ラベルに最新テキストをチラ見せ
        const label = document.getElementById('recLabel');
        if (label) label.textContent = '「' + text.slice(0,20) + (text.length>20?'…':'') + '」';
      }
    }
  };

  fullRecognition.onend = () => {
    // 録音中なら再起動
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      try { fullRecognition.start(); } catch(e) {}
    }
  };

  try { fullRecognition.start(); } catch(e) {}
}

function pauseResume() {
  if (!mediaRecorder) return;
  recPaused = !recPaused;
  if (recPaused) {
    mediaRecorder.pause();
    document.getElementById('recDot').className = 'rec-dot paused';
    document.getElementById('recPauseBtn').textContent = '▶';
    document.getElementById('recLabel').textContent = '一時停止中';
    if (fullRecognition) fullRecognition.stop();
  } else {
    mediaRecorder.resume();
    document.getElementById('recDot').className = 'rec-dot';
    document.getElementById('recPauseBtn').textContent = '⏸';
    document.getElementById('recLabel').textContent = '録音中...';
    startFullTranscription();
  }
}

function stopFullRecording() {
  if (!mediaRecorder) return;

  mediaRecorder.onstop = async () => {
    // 音声BlobをWhisper APIに送信
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    await processWithWhisperAndClaude(audioBlob);
  };

  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  clearInterval(recInterval);
  if (fullRecognition) fullRecognition.stop();

  document.getElementById('recBar').classList.add('hidden-bar');
  document.getElementById('recToggleBtn').classList.remove('recording');
  document.getElementById('recToggleBtn').textContent = '📄';
  mediaRecorder = null;
}

const AI_FILLED_FIELDS = new Set(); // AIが入力したフィールドを記録

const PROXY_BASE = 'https://zoho-proxy-g97j.onrender.com';

async function processWithWhisperAndClaude(audioBlob) {
  showAiOverlay('step1');

  try {
    // --- STEP1: Whisper文字起こし ---
    const formData = new FormData();
    formData.append('file', audioBlob, 'recording.webm');
    formData.append('model', 'whisper-1');
    formData.append('language', 'ja');

    const whisperRes = await fetch(`${PROXY_BASE}/api/whisper`, {
      method: 'POST',

      body: formData,
    });

    if (!whisperRes.ok) throw new Error('Whisper APIエラー: ' + whisperRes.status);
    const whisperData = await whisperRes.json();
    const transcript = whisperData.text || '';

    // 文字起こし結果をdataに保存
    data.Meeting_Transcript = transcript;

    showAiOverlay('step2');

    // --- STEP2: Claude で構造化 ---
    await runClaudeAutoFill(transcript);

  } catch(err) {
    hideAiOverlay();
    alert('AI処理中にエラーが発生しました：' + err.message + '\n\n手動で入力してください。');
    showTranscriptModal();
  }
}

async function runClaudeAutoFill(transcript) {
  if (!transcript) {
    hideAiOverlay();
    showTranscriptModal();
    return;
  }

  showAiOverlay('step2');

  const prompt = `以下は相続の面談の文字起こしテキストです。
このテキストから情報を抽出して、必ずJSONのみで返してください。マークダウンや説明文は不要です。

【文字起こし】
${transcript}

【抽出するJSONの形式】
{
  "Client_Name": "依頼者氏名（わかれば）",
  "Client_Kana": "依頼者ふりがな（わかれば）",
  "Client_Phone": "電話番号（わかれば）",
  "Deceased_Name": "被相続人氏名（わかれば）",
  "Deceased_Kana": "被相続人ふりがな（わかれば）",
  "Date_of_Death": "死亡日 YYYY-MM-DD形式（わかれば）",
  "Deceased_Address": "被相続人住所（わかれば）",
  "heirs": [{"Heir_Name":"氏名","Relationship":"関係（配偶者/子/父母/兄弟姉妹/その他）","Legal_Heir":true}],
  "Total_Asset_Estimate": "資産合計の数値のみ万円単位（わかれば）",
  "Bank_Names": "金融機関名（わかれば）",
  "Property_Sale": "不動産売却意向 有/無/検討中（わかれば）",
  "Resident_Status": "空き家/居住中（相続人）/居住中（第三者）/賃貸中（わかれば）",
  "Client_Intention": "依頼者の意向・要望（わかれば）",
  "Distribution_Policy": "分配方針（わかれば）",
  "Will_Type": "遺言種別 自筆/公正証書/その他（わかれば）",
  "Important_Notes": "特記事項・気になる点（わかれば）",
  "Difficulty": "難易度 易/普/難（総合判断）",
  "Tax_Filing_Required": "相続税申告 要/不要/確認中",
  "AI_Summary": "面談内容の要約（3〜5文）"
}

わからない項目は空文字列""にしてください。JSONのみ返してください。`;

  try {
    const res = await fetch(`${PROXY_BASE}/api/claude`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) throw new Error('Claude APIエラー: ' + res.status);
    const resData = await res.json();
    const rawText = resData.content?.[0]?.text || '{}';
    const clean = rawText.replace(/```json|```/g, '').trim();
    const extracted = JSON.parse(clean);

    showAiOverlay('step3');
    await new Promise(r => setTimeout(r, 600));

    // フォームに自動入力
    applyAiExtraction(extracted, transcript);

    hideAiOverlay();
    showAiResultModal(extracted, transcript);

  } catch(err) {
    hideAiOverlay();
    alert('Claude APIエラー：' + err.message);
    showTranscriptModal();
  }
}

function applyAiExtraction(extracted, transcript) {
  AI_FILLED_FIELDS.clear();

  const simpleFields = [
    'Client_Name','Client_Kana','Client_Phone','Deceased_Name','Deceased_Kana',
    'Date_of_Death','Deceased_Address','Total_Asset_Estimate','Bank_Names',
    'Client_Intention','Distribution_Policy','Important_Notes','Will_Type',
    'Tax_Filing_Required','Difficulty','Property_Sale','Resident_Status',
  ];

  simpleFields.forEach(key => {
    if (extracted[key] && !data[key]) {
      data[key] = extracted[key];
      AI_FILLED_FIELDS.add(key);
    }
  });

  // 相続人
  if (extracted.heirs && Array.isArray(extracted.heirs) && data.heirs.length === 0) {
    data.heirs = extracted.heirs.map(h => ({
      Heir_Name: h.Heir_Name || '',
      Heir_Kana: '',
      Relationship: h.Relationship || '',
      Legal_Heir: h.Legal_Heir !== false,
    }));
    AI_FILLED_FIELDS.add('heirs');
  }

  // 文字起こしと要約を保存
  data.Meeting_Transcript = transcript;
  data.AI_Summary = extracted.AI_Summary || '';

  updateCalc();
}

// ===== AI処理中オーバーレイ =====
function showAiOverlay(activeStep) {
  let overlay = document.getElementById('aiOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'aiOverlay';
    overlay.className = 'ai-overlay';
    overlay.innerHTML = `
      <div class="ai-overlay-icon">🤖</div>
      <div class="ai-overlay-title">AI が面談内容を解析中</div>
      <div class="ai-overlay-sub">しばらくお待ちください</div>
      <div class="ai-progress-steps">
        <div class="ai-step" id="aistep-step1"><div class="ai-step-dot"></div>音声をテキストに変換中（Whisper）</div>
        <div class="ai-step" id="aistep-step2"><div class="ai-step-dot"></div>面談内容を構造化中（Claude）</div>
        <div class="ai-step" id="aistep-step3"><div class="ai-step-dot"></div>フォームに自動入力中</div>
      </div>`;
    document.body.appendChild(overlay);
  }
  ['step1','step2','step3'].forEach(s => {
    const el = document.getElementById('aistep-' + s);
    if (!el) return;
    const stepNum = parseInt(s.replace('step',''));
    const activeNum = parseInt(activeStep.replace('step',''));
    el.className = 'ai-step' + (stepNum === activeNum ? ' active' : stepNum < activeNum ? ' done' : '');
  });
}

function hideAiOverlay() {
  const overlay = document.getElementById('aiOverlay');
  if (overlay) overlay.remove();
}

async function sendToZoho() {
  updateCalc();

  const btn = document.getElementById('btnZohoSend');
  if (btn) { btn.textContent = '送信中...'; btn.disabled = true; }

  try {
    // ① 商談レコード作成
    const dealPayload = buildDealPayload();
    const res = await fetch(`${PROXY_BASE}/api/deals`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payload: dealPayload }),
    });
    const result = await res.json();
    const record = result?.data?.[0];
    if (record?.code !== 'SUCCESS') {
      throw new Error(record?.message || record?.code || JSON.stringify(result));
    }
    const dealId = record.details.id;

    // ② 相続人レコード作成（複数）
    for (const h of data.heirs) {
      if (!h.Heir_Name) continue;
      await fetch(`${PROXY_BASE}/api/custom`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          module: 'CustomModule1',
          payload: {
            Name:     h.Heir_Name,
            field3:   h.Heir_Kana     || null,  // ふりがな
            field4:   h.Heir_Birthday || null,  // 生年月日
            field7:   h.Relationship  || null,  // 続柄
            field9:   h.Legal_Heir    || false, // 法定相続人フラグ
            field8:   { id: dealId },           // 案件（ルックアップ）
          }
        }),
      });
    }

    showZohoSuccessModal(dealId);

  } catch(err) {
    if (btn) { btn.textContent = '🔗 Zoho CRMに送信'; btn.disabled = false; }
    alert('Zoho送信エラー：' + err.message);
  }
}

function formatTime(s) {
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return m + ':' + sec;
}

function copyTranscript(mode) {
  const text = mode === 'plain'
    ? transcriptLog.map(l => l.text).join('\n')
    : transcriptLog.map(l => `[${l.time}] ${l.text}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    alert(mode === 'plain' ? '全文をコピーしました' : 'タイムスタンプ付きでコピーしました');
  });
}
